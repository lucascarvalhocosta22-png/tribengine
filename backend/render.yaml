services:
  - type: web
    name: tribengine-api
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tribengine-db
          property: connectionString
      - key: PORT
        value: "8000"

databases:
  - name: tribengine-db
    plan: free
    region: ohio
    postgresMajorVersion: 16
